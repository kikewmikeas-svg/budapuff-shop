<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BudaPuff • Кедровые шишки</title>

<style>

body{
background:#0f1720;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
margin-bottom:30px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#1e293b;
border:none;
padding:12px 18px;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#334155;
}

.lock{
background:#16a34a;
}

.off{
background:#ef4444;
}
  .lock{
background:#16a34a;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-top:10px;
}

.product-card{
background:#0e1a2b;
border-radius:12px;
padding:15px;
border:1px solid #1e2c40;
cursor:pointer;
transition:0.2s;
}

.product-card:hover{
transform:translateY(-3px);
border-color:#3a5bff;
}

.product-title{
font-weight:600;
margin-bottom:8px;
}

.product-price{
color:#6ee7a8;
font-size:14px;
}

</style>
</head>

<body>

<h1>🌲 Кедровые шишки / Гематоген</h1>

<div class="section">
<h3>Область</h3>
<div class="buttons" id="region-select"></div>
</div>

<div class="section">
<h3>Город</h3>
<div class="buttons" id="city-select"></div>
</div>

<div class="section">
<h3>Категории</h3>
<div class="buttons" id="category-select"></div>
</div>

<div class="section">
<h3>Товары</h3>
<div id="products"></div>
</div>

<div class="section">
<h3>Вес</h3>
<div class="buttons" id="weight"></div>
</div>

<div class="section">
<h3>Район</h3>
<div class="buttons" id="district-select"></div>
</div>

<script src="js/regions.js"></script>
<script src="js/crypto-products.js"></script>
<script type="module" src="js/crypto-shop.js"></script>

</body>
</html>
