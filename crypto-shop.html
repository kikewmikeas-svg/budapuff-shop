<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BudaPuff • Кедровые шишки</title>

<style>

body{
background:#0f1720;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
margin-bottom:30px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#1e293b;
border:none;
padding:12px 18px;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#334155;
}

.lock{
background:#16a34a;
}

.off{
background:#ef4444;
}

</style>
</head>

<body>

<h1>🌲 Кедровые шишки / Гематоген</h1>

<div class="section">
<h3>Категория</h3>
<div class="buttons" id="category"></div>
</div>

<div class="section">
<h3>Вес</h3>
<div class="buttons" id="weight"></div>
</div>

<div class="section">
<h3>Область</h3>
<div class="buttons" id="region-select"></div>
</div>

<div class="section">
<h3>Город</h3>
<div class="buttons" id="city-select"></div>
</div>

<div class="section">
<h3>Район</h3>
<div class="buttons" id="district-select"></div>
</div>

<script src="js/regions.js"></script>
<script src="js/crypto-products.js"></script>
<script type="module" src="js/crypto-shop.js"></script>

</body>
</html>
