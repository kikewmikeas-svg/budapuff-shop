.screen {

  transform: translateX(20px);
  transition: 0.3s ease;
}

.screen.show {
  opacity: 1;
  transform: translateX(0);
}

.fade-out {
  opacity: 0;
  transform: translateX(-20px);
  transition: 0.2s ease;
}

  transform: scale(0.85);
}

.qty-number {
  display: inline-block;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.qty-number.bump {
    animation: qtyPop 0.3s ease;
}

    0% { transform: scale(1); }
    50% { transform: scale(1.4); }

function updateCartBar() {

    const cartBar = document.getElementById("cartBar");
    const cartTotal = document.getElementById("cartTotal");

    const cartIcon = document.getElementById("cartIcon");
    const cartCount = document.getElementById("cartCount");

    if (!cartIcon || !cartCount) return;

    const totalCount = cart.reduce((sum, item) => sum + item.qty, 0);

    // обновляем цифру сверху
    cartCount.textContent = totalCount;

    // если корзина пустая — скрываем иконку
    if (totalCount === 0) {
        cartIcon.style.display = "none";
    } else {
        cartIcon.style.display = "flex";
    }

    // --- нижняя панель ---
    if (!cartBar || !cartTotal) return;

    if (cart.length === 0) {
        cartBar.style.display = "none";
        return;
    }

    const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

    cartTotal.textContent = total + " ₽";
    cartBar.style.display = "block";
}

function changeQty(name, price, delta, pack = null) {

    const existing = cart.find(i => 
        i.name === name && 
        (pack === null || i.pack == pack)
    );

    if (existing) {

        existing.qty += delta;

        if (existing.qty < 1) {

    if (appState.view === "cart") {
        existing.qty = 1;
    } else {
        cart = cart.filter(i => 
            !(i.name === name && (pack === null || i.pack == pack))
        );
    }
}

let currentPack = 3;

function selectPack(pack, name, basePrice) {

    currentPack = pack;

    document.querySelectorAll(".pack-option").forEach(btn => {
        btn.classList.remove("active");
    });

    event.target.classList.add("active");

    updateSeedPrice(basePrice);
}

function updateSeedPrice(basePrice) {

    const qty = parseInt(document.getElementById("seedQty")?.textContent || 1);

    const multiplier = currentPack / 3;
    const newPrice = Math.round(basePrice * multiplier * qty);

    const priceBox = document.querySelector(".price-box");

    if (priceBox) {
        priceBox.innerHTML = newPrice + " <span>₽</span>";
    }
}

function changeSeedQty(name, basePrice, delta) {

    const qtyEl = document.getElementById("seedQty");
    let qty = parseInt(qtyEl.textContent);

    qty += delta;
    if (qty < 1) qty = 1;

    qtyEl.textContent = qty;

    // 🔥 пересчёт цены
    const multiplier = currentPack / 3;
    const newPrice = Math.round(basePrice * multiplier * qty);

    const priceBox = document.querySelector(".price-box");
    if (priceBox) {
        priceBox.innerHTML = newPrice + " <span>₽</span>";
    }

    // анимация
    qtyEl.classList.remove("bump");
    void qtyEl.offsetWidth;
    qtyEl.classList.add("bump");
}

function addSeedToCart(name, basePrice) {

    const qty = parseInt(document.getElementById("seedQty").textContent);

    const multiplier = currentPack / 3;
    const finalPrice = Math.round(basePrice * multiplier);

    // 🔥 теперь учитываем pack
    const existing = cart.find(i => 
        i.name === name && i.pack === currentPack
    );

    if (existing) {
        existing.qty += qty;
    } else {
        cart.push({
            name,
            price: finalPrice,
            qty,
            pack: currentPack
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartBar();
}

function selectEdiblePack(piece, name, basePrice, element) {

    selectedPiece = piece;

    const wrapper = element.closest(".seed-pack-options");

    wrapper.querySelectorAll(".edible-pack-option").forEach(btn => {
        btn.classList.remove("active");

    element.classList.add("active");

    const productCard = element.closest(".seed-action-block").parentElement;

    updateEdiblePrice(basePrice, productCard);
}

function updateEdiblePrice(basePrice, productCard) {

    if (!selectedPiece) return;

    const qty = parseInt(document.getElementById("edibleQty")?.textContent || 1);

    const baseUnit = selectedPiece >= 3 && selectedPiece % 3 !== 0 ? 3 : 2;
const multiplier = selectedPiece / baseUnit;
    const newPrice = Math.round(basePrice * multiplier * qty);

    const priceBox = productCard.querySelector(".price-box");

    if (priceBox) {
        priceBox.innerHTML = newPrice + " <span>₽</span>";
    }
}

function changeEdibleQty(name, basePrice, delta) {

async function sendOrder(name, phone, address, comment) {

    if (isSendingOrder) return;
    isSendingOrder = true;

    if (cart.length === 0) {
        alert("Корзина пустая");
        isSendingOrder = false;
        return;
    }

    const tg = window.Telegram?.WebApp;

    tg?.HapticFeedback?.impactOccurred("light");

    const user = tg?.initDataUnsafe?.user;
    const payment = document.querySelector('input[name="payment"]:checked')?.value || "не выбран";
    const delivery = document.querySelector('input[name="delivery"]:checked')?.value || "не выбран";

    let text = "🆕 Новый заказ\n\n📦 Товары:\n";

    text += `
👤 Имя: ${name}
📞 Телефон: ${phone}
📍 Адрес: ${address}
📝 Комментарий: ${comment || "—"}

💳 Способ оплаты: ${payment}
🚚 Способ доставки: ${delivery}

`;

    let total = 0;

    cart.forEach(item => {
        text += `• ${item.name} x ${item.qty} — ${item.price * item.qty} ₽\n`;
        total += item.price * item.qty;
    });

    text += `\n💰 Итого: ${total} ₽\n\n`;
    text += `👤 Клиент:\n`;
    text += `Username: @${user?.username || "не указан"}\n`;
    text += `🆔 ID: ${user?.id}`;

    const btn = document.querySelector(".summary-btn");
    if (btn) {
        btn.classList.add("loading");
        btn.innerText = "Отправка...";
        btn.disabled = true;
    }

    try {

        const response = await fetch("/api/send-order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                orderText: text,
                initData: tg?.initData
            })
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        tg?.HapticFeedback?.notificationOccurred("success");

        cart = [];
        localStorage.removeItem("cart");
        localStorage.removeItem("appState");

        updateCartBar();
        updateBackButton();

        showSuccessMessage();

    } catch (error) {

        console.error("Ошибка:", error);

        tg?.HapticFeedback?.notificationOccurred("error");

        alert("Ошибка отправки заказа");

        if (btn) {
            btn.classList.remove("loading");
            btn.innerText = "Подтвердить заказ";
            btn.disabled = false;
        }

    } finally {
        isSendingOrder = false;
    }
}

  function initSliderDots() {
    const slider = document.getElementById("slider");
    if (!slider) return;

    const dots = document.querySelectorAll(".dot");

    slider.addEventListener("scroll", () => {
        const slideWidth = slider.offsetWidth;
        const index = Math.round(slider.scrollLeft / slideWidth);

        dots.forEach(dot => dot.classList.remove("active"));
        if (dots[index]) {
            dots[index].classList.add("active");
        }
    });
}

 function restoreState() {

    const saved = JSON.parse(localStorage.getItem("appState"));

    if (!saved) {
        renderCategories();
        return;
    }

    Object.assign(appState, saved);

// 🔴 фикс
if (appState.view === "product" || appState.view === "cart") {
    appState.view = "categories";
    appState.category = null;
    appState.subCategory = null;
    appState.product = null;
}

isRestoringState = true;

// При перезапуске всегда стартуем с каталога
appState.view = "categories";
appState.category = null;
appState.subCategory = null;
appState.product = null;

switch (appState.view) {

        case "categories":
            renderCategories();
            break;

        case "category":
            openCategory(appState.category);
            break;

        case "product":
            openProduct(
                appState.category,
                appState.subCategory,
                appState.product
            );
            break;

        case "cart":
            renderCart();
            break;

        case "profile":
            renderProfile();
            break;

        default:
            renderCategories();
    }

    isRestoringState = false;
}

    document.querySelectorAll(".top-menu button").forEach(btn => {
        btn.classList.remove("active");
    });

    const map = {
        categories: "🛍 Каталог",
        profile: "👤 Профиль",
        how: "❓ Как оформить",
        delivery: "🚚 Доставка",
        payment: "💳 Оплата"
    };

    document.querySelectorAll(".top-menu button").forEach(btn => {
        if (btn.innerText.includes(map[view])) {
            btn.classList.add("active");
        }
    });
}

let profileData = null;   // ← ВСТАВИТЬ СЮДА

function renderProfile() {

    saveState();
    updateBackButton();
    setActiveMenu("profile");

    
    const tg = window.Telegram?.WebApp;

    if (!tg) {
        showProfileError("Telegram WebApp не найден");
        return;
    }

   let user = tg.initDataUnsafe?.user || {};

    // Получаем статистику заказов (если есть)
    profileData = { orders_count: 0, total_spent: 0 };

    const displayName = user.username
        ? "@" + user.username
        : user.first_name;

    const avatar = user.photo_url
        ? user.photo_url
        : "icons/user.png";

    let html = `
        <button id="backBtn" onclick="renderCategories()">← Назад</button>

        <div style="padding:20px">

            <div style="text-align:center; margin-bottom:25px;">
                <img src="${avatar}" 
                     style="width:90px;height:90px;border-radius:50%;margin-bottom:10px;">
                <h2 style="margin:0;">${displayName}</h2>
            </div>

            <div style="display:flex; gap:15px;">

                <div onclick="renderOrders()" 
                     style="flex:1;background:#1c1f26;padding:20px;border-radius:18px;text-align:center;cursor:pointer;">
                    <div style="font-size:26px;margin-bottom:8px;">📦</div>
                    <div>Мои заказы</div>
                    <div style="opacity:0.6;font-size:14px;margin-top:5px;">
                        <span class="orders-count">${profileData.orders_count || 0}</span>
                    </div>
                </div>

                <div onclick="renderFavorites()"
     style="flex:1;background:#1c1f26;padding:20px;border-radius:18px;text-align:center;cursor:pointer;">
    <div style="font-size:26px;margin-bottom:8px;">❤️</div>
    <div>Избранное</div>
</div>

            </div>

            <div style="margin-top:25px;background:#1c1f26;padding:15px;border-radius:15px;">
    <div style="display:flex;justify-content:space-between;">
        <span>Потрачено</span>
        <span class="total-spent">${profileData.total_spent || 0}</span>
    </div>
</div>
</div>
`;

    document.getElementById("main").innerHTML = html;
  window.scrollTo(0, 0);
  // 🔄 Загружаем данные в фоне (без блокировки интерфейса)
fetch(`/api/get-profile?userId=${user.id}`)
    .then(res => res.ok ? res.json() : null)
    .then(data => {
        if (!data) return;

        profileData = data;

        // обновляем цифры без перерендера
        const ordersEl = document.querySelector(".orders-count");
        const spentEl = document.querySelector(".total-spent");

        if (ordersEl) ordersEl.textContent = data.orders_count || 0;
        if (spentEl) spentEl.textContent = data.total_spent || 0;
    })
    .catch(() => {});
}
  function renderOrders() {

    if (!profileData || !profileData.orders) {
        showToast("Нет заказов");
        return;
    }


    saveState();
    updateBackButton();
    setActiveMenu(null);

    const ordersHtml = profileData.orders.map(order => `
        <div class="order-card">
           <div class="order-header">
    <strong>Заказ №${order.order_number}</strong>
    <span>${new Date(order.created_at).toLocaleString()}</span>
</div>

<div class="order-status ${getStatusClass(order.status)}">
    ${order.status || "Передано оператору"}
</div>
            <div class="order-total">
                Итого: ${order.total} ₽
            </div>
           <<details>
    <summary>Посмотреть состав</summary>
    <div class="order-details">
        ${order.order_text.replace(/\n/g, "<br>")}
    </div>
</details>
        </div>
    `).join("");

   document.getElementById("main").innerHTML = `
    <div class="orders-screen">

       <button id="backBtn" onclick="renderProfile()">← Назад</button>

        <h2>Мои заказы</h2>

        ${ordersHtml || "<p>Заказов пока нет</p>"}

    </div>
    `;
}
  function getStatusClass(status) {
    if (status === "В обработке") return "status-processing";
    if (status === "Завершён") return "status-done";
    if (status === "Отменён") return "status-cancel";
    return "status-pending";
}
  
  function showProfileError(message) {
    document.getElementById("main").innerHTML = `
        <div style="padding:20px">
            <h2>Ошибка</h2>
            <p>${message}</p>
        </div>
    `;
}
 function toggleFavorite(category, name) {

    const index = favorites.findIndex(
        item => item.category === category && item.name === name
    );

    if (index !== -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push({ category, name });
    }

    localStorage.setItem("favorites", JSON.stringify(favorites));

    // ✅ меняем только кнопку
    const cardId = `card-${name.replace(/\s/g, "_")}`;
    const card = document.getElementById(cardId);

    if (card) {
        const btn = card.querySelector(".favorite-btn");
        if (btn) {
            btn.classList.toggle("active");
            btn.innerHTML = btn.classList.contains("active") ? "❤️" : "🤍";
        }
    }
}
  function renderFavorites() {

    saveState();
    updateBackButton();

    let html = `
        <button id="backBtn" onclick="renderProfile()">← Назад</button>
        <h2 style="margin:15px 0;">❤️ Избранное</h2>
        <div class="products-grid">
    `;

    if (favorites.length === 0) {
        html += `
            <div style="opacity:0.6;padding:20px;">
                У вас пока нет избранных товаров
            </div>
        `;
    } else {

        favorites.forEach(fav => {

            const product = products[fav.category]
                .find(p => p.name === fav.name);

            if (!product) return;

            html += `
                <div class="product-card show"
                     onclick="openProduct('${fav.category}', null, '${product.name.replace(/'/g, "\\'")}')">

                    <img src="${product.images ? product.images[0] : product.image}">

                    <div class="category-content">
                        <div class="category-title">${product.name}</div>
                        <div class="category-price">${product.price} ₽</div>
                    </div>
                </div>
            `;
        });
    }

    html += `</div>`;

    document.getElementById("main").innerHTML = html;
    window.scrollTo(0, 0);
}
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.enableClosingConfirmation();
}

let currentMushroomPack = null;
let currentMushroomPrice = null;

function selectMushroomPack(pack, price) {

    currentMushroomPack = pack;
    currentMushroomPrice = price;

    const priceBox = document.getElementById("productPrice");
    if (priceBox) {
        priceBox.innerHTML = price + " <span>₽</span>";
    }

    document.querySelectorAll(".mushroom-pack-option").forEach(el => {
    el.classList.remove("active");

    if (el.innerText.trim() === pack) {
        el.classList.add("active");
    }
});
}
  // ===== EDIBLE — выбор количества =====
function selectEdibleQty(name, price, qty, el) {

    setQty(name, qty);

    document.querySelectorAll(".edible-qty-option")
        .forEach(btn => btn.classList.remove("active"));

    el.classList.add("active");
}

function addPackedProductToCart(category, name, defaultPack) {

    const pack = currentMushroomPack || defaultPack;

    const product = products[category]
        .find(p => p.name === name);

    const price = currentMushroomPrice || product.packs[pack];

    const fullName = `${name} (${pack})`;

    changeQty(fullName, price, 1);
}

let currentTeaPack = null;
let currentTeaPrice = null;

function addTeaToCart(name, defaultPack) {

    const pack = currentTeaPack || defaultPack;

    const product = products["Расслабляющий чай"]
        .find(p => p.name === name);

    const price = currentTeaPrice || product.packs[pack];

    const fullName = `${name} (${pack})`;

    changeQty(fullName, price, 1);
}
  


restoreState();
updateCartBar();
