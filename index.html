  // ===== ПРОВЕРКА БАНА =====
async function checkBan(){

  try{

    const user = tg.initDataUnsafe?.user;

    if(!user){
      document.body.style.display = "block";
      return;
    }

    const res = await fetch(`/api/check-ban?userId=${user.id}`);
    const data = await res.json();

    if(data.banned){

      localStorage.clear();
      sessionStorage.clear();

      Telegram.WebApp.showAlert("Error 505");

      Telegram.WebApp.close();
      return;
    }

    document.body.style.display = "block";

  }catch(e){

    console.error("Ban check error:", e);

    document.body.style.display = "block";

  }

}

function initCityAutocomplete() {

    const cityInput = document.getElementById("oldCheckoutCity");
const suggestionsBox = document.getElementById("oldCitySuggestions");

    if (!cityInput || !suggestionsBox) return;

    cityInput.addEventListener("input", function () {
        const value = cityInput.value.trim().toLowerCase();
        suggestionsBox.innerHTML = "";

        if (!value) {
            suggestionsBox.classList.add("hidden");
            return;
        }

        const allCities = [
  ...citiesByCountry["RU"],
  ...citiesByCountry["BY"],
  ...citiesByCountry["KZ"]
];
const cities = currentCountry && currentCountry !== "ALL"
  ? citiesByCountry[currentCountry] || []
  : allCities;

       const filtered = cities
    .filter(city => city.toLowerCase().startsWith(value))
    .slice(0, 8);

        
        // Показываем найденные города
filtered.forEach(city => {
    const div = document.createElement("div");
    div.className = "city-item";
    div.textContent = city;

    div.onclick = () => {
        cityInput.value = city;
        suggestionsBox.classList.add("hidden");
    };

    suggestionsBox.appendChild(div);
});

// Если ничего не найдено — предлагаем другой город
if (filtered.length === 0) {
    const otherDiv = document.createElement("div");
    otherDiv.className = "city-item other-city";
    otherDiv.textContent = "Другой город";

    otherDiv.onclick = () => {
    cityInput.value = "";   // очищаем поле
    cityInput.focus();      // возвращаем курсор
    suggestionsBox.classList.add("hidden");
};

    suggestionsBox.appendChild(otherDiv);
} else {
    // Даже если нашли — добавим пункт "Другой город"
    const otherDiv = document.createElement("div");
    otherDiv.className = "city-item other-city";
    otherDiv.textContent = "Другой город";

    otherDiv.onclick = () => {
    cityInput.value = "";   // очищаем поле
    cityInput.focus();      // возвращаем курсор
    suggestionsBox.classList.add("hidden");
};

    suggestionsBox.appendChild(otherDiv);
}

suggestionsBox.classList.remove("hidden");
    });

    document.addEventListener("click", function (e) {
        if (!e.target.closest(".city-wrapper")) {
            suggestionsBox.classList.add("hidden");
        }
    });
}

const appState = {
    view: "categories",
    category: null,
    subCategory: null,

};

function pushState() {
    navigationStack.push({
        view: appState.view,
        category: appState.category,
        subCategory: appState.subCategory,
        product: appState.product
    });
}
  function goBack(){

    if(navigationStack.length === 0){
        renderCategories();
        return;
    }

    const prev = navigationStack.pop();

    appState.view = prev.view;
    appState.category = prev.category;
    appState.subCategory = prev.subCategory;
    appState.product = prev.product;

    if(prev.view === "categories") renderCategories();
    else if(prev.view === "category") openCategory(prev.category);
    else if(prev.view === "product") openProduct(prev.category, prev.subCategory, prev.product);
    else if(prev.view === "cart") renderCart();
}

// НОВЫЙ КОД — вставить
function updateCartBar() {

    const cartBar = document.getElementById("cartBar");
    const cartTotal = document.getElementById("cartTotal");
   
  

    // ✅ Новый магазин активен — полностью блокируем всё и выходим
    if (document.querySelector(".new-shop")) {
        if (cartBar)  cartBar.style.cssText  = "display:none!important;visibility:hidden!important;pointer-events:none!important;";
        return;  // ← ранний выход, ничего больше не выполняется
    }

    if (!cartBar || !cartTotal) return;

    if (cart.length === 0) {
        cartBar.style.display = "none";
        return;
    }

    const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    cartTotal.textContent = total + " ₽";
    cartBar.style.cssText = "";        // сбрасываем на случай возврата из нового магазина
    cartBar.style.display = "block";
}

    <div class="product-info">
        <div class="product-name">${item.name}</div>

            <div class="add-btn">+</div>
        </div>
    </div>

</div>`;

    } else {

        Object.keys(categoryData).forEach((sub, index) => {

<div class="product-card show"
    style="animation-delay:${index * 0.05}s"
    onclick="openSubCategory('${category}', '${sub}')">

</div>
<div class="products-grid">${itemsHtml}</div>
`;

    window.scrollTo(0, 0);

function openSubCategory(category, subCategory) {

  if (appState.view !== "subCategory") pushState();
  appState.view = "subCategory";

  const items = products[category][subCategory];

  let itemsHtml = items.map((item, index) => {
    const price = item.packs
      ? Math.min(...Object.values(item.packs))
      : item.price;
    const isFav = favorites.some(f => f.category === category && f.name === item.name);

    return `
      <div class="product-card show"
           id="card-${item.name.replace(/\s/g, "_")}"
           style="animation-delay:${index * 0.05}s"
           onclick="openProduct('${category}', '${subCategory}', '${item.name.replace(/'/g, "\\'")}')">
        <div class="product-img-wrap">
          <img loading="lazy" class="product-img" src="${item.images ? item.images[0] : item.image}">

            <div class="product-price">${price.toLocaleString()} <span>₽</span></div>
            <div class="add-btn">+</div>
          </div>
        </div>
      </div>`;
  }).join("");

  document.getElementById("main").innerHTML = `
    <div class="cat-screen-header">
      <div class="back-btn" onclick="goBack()">‹</div>
      <div class="cat-screen-title">${subCategory}</div>

  `;

  window.scrollTo(0, 0);
  animatePageIn();
}
  
function openCategory(category){

    if (appState.view !== "category") {
        pushState();
    }

    appState.view = "category";
    appState.category = category;
    appState.subCategory = null;
    appState.product = null;

    if (!isRestoringState) saveState();
    updateBackButton();

    renderCategoryContent(category);
}

function initSliderDots() {
  const slider = document.getElementById("slider");
  if (!slider) return;
  const dots = document.querySelectorAll(".dot");
  slider.addEventListener("scroll", () => {
    const index = Math.round(slider.scrollLeft / slider.offsetWidth);
    dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
  });
}

}

function removeFromCart(name, pack = null) {

    cart = cart.filter(item => {
        if (pack === null) {

        }
        return !(item.name === name && item.pack == pack);
    });

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    updateCartBar();
}

coSelect = function(el, name) {
  const block = el.closest(".co-block");
  block.querySelectorAll(".co-radio-dot").forEach(d => d.classList.remove("active"));
  block.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
  el.querySelector(".co-radio-dot").classList.add("active");

 function handlePhoneInput(e) {
    let value = e.target.value.replace(/[^\d+]/g, "");
   // если вводят 375 без +
if (value.startsWith("375")) {
    value = "+" + value;
}

// если вводят 77 без +
if (value.startsWith("77")) {
    value = "+" + value;
}

    const countryEl = document.getElementById("phoneCountry");

    // 8 → +7
    if (value.startsWith("8")) {
        value = "+7" + value.slice(1);
    }

    // 7 → +7
    if (value.startsWith("7") && !value.startsWith("+7")) {
        value = "+7" + value.slice(1);
    }

    let maxLength = 12;
    let flag = "";

  if (value.startsWith("+375")) {
    maxLength = 13;
    flag = "🇧🇾";

    if (currentCountry !== "BY") {
        currentCountry = "BY";
        const cityInput = document.getElementById("checkoutCity");
        if (cityInput) cityInput.value = "";
    }

} else if (value.startsWith("+77")) {
    maxLength = 12;
    flag = "🇰🇿";

    if (currentCountry !== "KZ") {
        currentCountry = "KZ";
        const cityInput = document.getElementById("checkoutCity");
        if (cityInput) cityInput.value = "";
    }

} else if (value.startsWith("+7")) {
    maxLength = 12;
    flag = "🇷🇺";

    if (currentCountry !== "RU") {
        currentCountry = "RU";
        const cityInput = document.getElementById("checkoutCity");
        if (cityInput) cityInput.value = "";
    }
}

    if (value.length > maxLength) {
        value = value.slice(0, maxLength);
    }

    e.target.value = value;

    if (flag) {
        countryEl.textContent = flag;
        countryEl.classList.remove("hidden");
    } else {
        countryEl.textContent = "";
        countryEl.classList.add("hidden");
    }
}

async function sendOrder(name, phone, address, comment) {

    if (isSendingOrder) return;
    isSendingOrder = true;

    if (cart.length === 0) {
        alert("Корзина пустая");
        isSendingOrder = false;
        return;
    }

    const tg = window.Telegram?.WebApp;

    tg?.HapticFeedback?.impactOccurred("light");

    const user = tg?.initDataUnsafe?.user;
    const payment = document.querySelector('input[name="payment"]:checked')?.value || "не выбран";
    const delivery = document.querySelector('input[name="delivery"]:checked')?.value || "не выбран";

    let text = "🆕 Новый заказ\n\n📦 Товары:\n";

    text += `
👤 Имя: ${name}
📞 Телефон: ${phone}
📍 Адрес: ${address}

💳 Способ оплаты: ${payment}
🚚 Способ доставки: ${delivery}

`;

    let total = 0;

    cart.forEach(item => {
        text += `• ${item.name} x ${item.qty} — ${item.price * item.qty} ₽\n`;
        total += item.price * item.qty;
    });

    text += `\n💰 Итого: ${total} ₽\n\n`;
   

    const btn = document.getElementById("confirmOrderBtn");
    if (btn) {
        btn.classList.add("loading");
        btn.innerText = "Отправка...";
        btn.disabled = true;
    }

    try {

        const response = await fetch("/api/send-order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                orderText: text,
                initData: tg?.initData
            })
        });

        if (!response.ok) {
            throw new Error("Server error");
        }

        tg?.HapticFeedback?.notificationOccurred("success");

        cart = [];
        localStorage.removeItem("cart");
        localStorage.removeItem("appState");

        updateCartBar();
        updateBackButton();

        showSuccessMessage();

    } catch (error) {

        console.error("Ошибка:", error);

        tg?.HapticFeedback?.notificationOccurred("error");

        alert("Ошибка отправки заказа");

        if (btn) {
            btn.classList.remove("loading");
            btn.innerText = "Подтвердить заказ";
            btn.disabled = false;
        }

    } finally {
        isSendingOrder = false;
    }
}

  function toggleDescription() {
  const content = document.getElementById("productDescription");
  const icon = document.querySelector(".p-desc-icon");
  if (!content) return;

  if (content.style.display === "none" || content.style.display === "") {
    // открываем
    content.style.display = "block";
    content.style.opacity = "0";
    content.style.maxHeight = "0";
    content.style.overflow = "hidden";
    content.style.transition = "opacity .25s ease, max-height .3s ease";
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        content.style.opacity = "1";
        content.style.maxHeight = "600px";
      });
    });
    if (icon) icon.textContent = "˅";
  } else {
    // закрываем
    content.style.transition = "opacity .2s ease, max-height .25s ease";
    content.style.opacity = "0";
    content.style.maxHeight = "0";
    setTimeout(() => {
      content.style.display = "none";
    }, 250);
    if (icon) icon.textContent = "›";
  }
}

 function toggleFavorite(category, name) {
  const index = favorites.findIndex(
    item => item.category === category && item.name === name
  );

  if (index !== -1) {
    favorites.splice(index, 1);
    showToast("Удалено из избранного");
  } else {
    favorites.push({ category, name });
    showToast("Добавлено в избранное");
  }

  localStorage.setItem("favorites", JSON.stringify(favorites));

  // если открыта страница избранного — перерендерить
  if (document.querySelector(".cat-screen-header .cat-screen-title")?.textContent === "Избранное") {
    renderFavorites();
    return;
  }

  // если открыта страница товара — обновить кнопку
  const favBtn = document.querySelector(".p-fav");
  if (favBtn) {
    const isNowFav = favorites.some(f => f.category === category && f.name === name);
    favBtn.innerHTML = isNowFav ? "❤️" : "🤍";
    favBtn.classList.toggle("active", isNowFav);
    return;
  }

  // если открыта сетка категории — обновить кнопку на карточке
  const cardId = `card-${name.replace(/\s/g, "_")}`;
  const card = document.getElementById(cardId);
  if (card) {
    const btn = card.querySelector(".fav-btn");
    if (btn) {
      const isNowFav = favorites.some(f => f.category === category && f.name === name);
      btn.classList.toggle("active", isNowFav);
      btn.innerHTML = isNowFav ? "❤️" : "🤍";
    }
  }
}

    addBtn.onclick = () => addPackedProductToCart(category, productName, pack);
  }
  const hasInCart = cart.some(i => i.name.startsWith(productName));
  if (hasInCart) {
    const cartBtn = document.getElementById("pack-cart-btn");
    if (cartBtn) cartBtn.classList.add("visible");
  }
}

function selectEdibleQty(name, price, qty, el) {

    setQty(name, qty);

    document.querySelectorAll(".edible-qty-option")
        .forEach(btn => btn.classList.remove("active"));

    el.classList.add("active");
}

function addPackedProductToCart(category, name, defaultPack) {
  const pack = currentMushroomPack || defaultPack;
  const product = products[category].find(p => p.name === name);
  const price = currentMushroomPrice || product.packs[pack];
  const fullName = `${name} (${pack})`;
  const existing = cart.find(i => i.name === fullName);
if (existing) {
  existing.qty += 1;
} else {
  cart.push({ name: fullName, price, qty: 1 });
}
localStorage.setItem("cart", JSON.stringify(cart));
updateCartBar();
  showToast("Товар добавлен в корзину");

  const cartBtn = document.getElementById("pack-cart-btn");
if (cartBtn) cartBtn.classList.add("visible");
}

  function closeShop(){
  Telegram.WebApp.close();
}

function packChangeQty(fullName, price, delta) {
  const existing = cart.find(i => i.name === fullName);
  if (!existing) return;
  existing.qty = Math.max(1, existing.qty + delta);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartBar();
  const numEl = document.getElementById("pack-qty-num");
  if (numEl) numEl.textContent = existing.qty;
  const priceBox = document.getElementById("productPrice");
  if (priceBox) priceBox.innerHTML = (price * existing.qty).toLocaleString() + " <span>₽</span>";
}

function goToNewShop() {
  const overlay = document.getElementById("shopTransition");
  overlay.classList.add("flash");
  setTimeout(() => {
    enterNewShop();
    setTimeout(() => overlay.classList.remove("flash"), 400);
  }, 600);
}
